# Local development compose file.
# Access everything through http://localhost:80 — nginx routes internally.
# The other ports are exposed for direct access if needed (e.g. API testing).
services:
  training-kitchen:
    image: training-kitchen:latest
    ports:
      - "80:80" # Dashboard + all tools via nginx (primary entry point)
      - "8080:8080" # FileBrowser Quantum (direct)
      - "5001:5001" # LLM API / llama_router (direct)
      - "5002:5002" # VLM Captioner (direct)
      - "5005:5005" # Coordinator API (direct)
      - "8676:8676" # AI Toolkit UI via nginx proxy (direct to 8675 bypasses the guard script)
    environment:
      # Override for non-standard RunPod storage mounts (e.g. /mnt/workspace, /runpod-volume)
      - STORAGE_DIR=${STORAGE_DIR:-/workspace}
    volumes:
      - workspace:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

volumes:
  workspace:
