[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
user=root

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autorestart=true

[program:fbq]
environment=FILEBROWSER_CONFIG="/app/filebrowser.yaml"
command=filebrowser
autorestart=true
stdout_logfile=/var/log/fbq.log
stderr_logfile=/var/log/fbq.log
stdout_logfile_maxbytes=1MB

[program:vlm_ui]
directory=/app/vlm-caption
# Flask API runs on internal port 5003. Port 5002 is served by nginx (web UI + proxy).
command=python3 app.py --port 5003
autorestart=true

[program:ostris_gui]
directory=/app/ai-toolkit/ui
# Real AI Toolkit UI - Node.js app on port 8675 (internal).
# Port 8676 is fronted by nginx, which injects the auto-stop guard script.
command=npm run build_and_start
autorestart=true
stdout_logfile=/var/log/ostris_gui.log
stderr_logfile=/var/log/ostris_gui.log
stdout_logfile_maxbytes=1MB


[program:coordinator]
command=python3 /app/scripts/coordinator.py
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
# Serves API on port 5005 (polled by the dashboard)

[program:updater]
# One-shot background updater: pulls latest commits and reinstalls only if requirements changed
command=bash /app/scripts/updater.sh
autostart=true
autorestart=false
startsecs=0
startretries=0