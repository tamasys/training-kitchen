# Training Kitchen default configuration for vlm-caption.
# This file is copied to caption.yaml on first run if no saved config exists.
# The user's saved config (~/.vlm-caption/caption.yaml) takes precedence after
# the first save, so this only applies to fresh containers.
#
# base_url points to our local llama_router (llama-cpp-python OpenAI-compatible server).
# The port is fixed at 5001 — start the engine from the Dashboard before captioning.
base_url: http://127.0.0.1:5001/v1
api_key_env_vars:
- OPENAI_API_KEY
- ANTHROPIC_API_KEY
- GEMINI_API_KEY
- MY_API_KEY_ENV_VAR_NAME
model: ''
api_key: ''
max_tokens: 16384
system_prompt: "You are to analyze an image and provide information based on what
  is visible in the image. Do not embellish, and avoid language like 'showcases'
  or 'features,' preferring to focus on factual information. Make sure anything that
  is out of frame is NOT described. If metadata is present it can be trusted to be
  accurate. Never include things that are not present in the image, and do not say
  things like 'no characters are visible.' Do not write things like 'No other characters
  are visible' or 'The character's features do not align with any specific character'."
global_metadata_file: ''
prompts:
- Describe the image in detail. Physically describe each character.
- Can you positively identify any characters, objects, or locations based on the codex
  or metadata? If you can identify characters, give reasons for the positive id.
- Describe the framing and composition, shot type, shot angle. For this request, think
  like a photographer or cinematographer.
- "To finalize, summarize the description of the image in four to five sentences,
  focusing on factual information present in the image. Do not include any markdown,
  headers, or special formatting. Do not start with 'the image depicts' or similar.
  Simply exclude such phrases and focus on what IS visible."
hint_sources:
- full_path
- json
- metadata
base_directory: __STORAGE_DIR__/images
recursive: true
skip_if_txt_exists: true
