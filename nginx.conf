server {
    listen 80;
    server_name _;
    absolute_redirect off;

    # Dashboard (static files)
    root /app/www;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Coordinator API proxied here so the dashboard can call /api/* same-origin (no CORS).
    # Tool apps (FileBrowser, VLM, AI Toolkit) are NOT proxied here — they use absolute
    # asset paths internally and break when served through a subpath prefix. Access them
    # directly on their own ports (see docker-compose.yml for fixed local port mappings).
    location /api/ {
        proxy_pass http://127.0.0.1:5005/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }
}

# VLM Captioner — custom web UI on port 5002
# Serves our static HTML frontend and proxies /api/ to Flask (port 5003)
server {
    listen 5002;
    server_name _;
    absolute_redirect off;

    root /app/www/vlm;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve the shared auto-stop guard script from the main www root.
    # This avoids duplicating the file — there is only one source of truth.
    location = /autostop-guard.js {
        alias /app/www/autostop-guard.js;
    }

    # Proxy API to Flask. Disable buffering for SSE (/api/run) to work correctly.
    location /api/ {
        proxy_pass http://127.0.0.1:5003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # Coordinator API (platform info, autostop) accessible from VLM pages
    # using a stable relative path so the guard script doesn't need URL construction.
    location /api/coordinator/ {
        proxy_pass http://127.0.0.1:5005/api/coordinator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/platform {
        proxy_pass http://127.0.0.1:5005/api/platform;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

}

# AI Toolkit — nginx proxy on port 8676 → native Node.js app on port 8675.
# Uses sub_filter to inject the shared auto-stop warning overlay into every page.
server {
    listen 8676;
    server_name _;

    # No upload size limit — dataset uploads can be large image batches or zip files.
    client_max_body_size 10G;

    # Serve the shared auto-stop guard script as a static file.
    location = /autostop-guard.js {
        alias /app/www/autostop-guard.js;
    }

    # Coordinator API accessible from AI Toolkit pages.
    location /api/coordinator/ {
        proxy_pass http://127.0.0.1:5005/api/coordinator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/platform {
        proxy_pass http://127.0.0.1:5005/api/platform;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy everything else to the AI Toolkit Node.js process.
    location / {
        proxy_pass http://127.0.0.1:8675;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket support (AI Toolkit uses WS for live training progress).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;

        # Inject the guard script just before </body> in every HTML response.
        sub_filter '</body>' '<script src="/autostop-guard.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html application/xhtml+xml;

        # Disable compression on proxied responses so sub_filter can read them.
        proxy_set_header Accept-Encoding "";
    }
}
